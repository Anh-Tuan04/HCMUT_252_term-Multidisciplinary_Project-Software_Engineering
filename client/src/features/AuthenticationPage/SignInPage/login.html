<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Đăng nhập</title>
    <link rel="stylesheet" href="style_login.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="auth-shell">
            <section class="auth-card">
                <p class="chip">Smart Parking</p>
                <h2 class="login-header">Dang nhap</h2>
                <p class="desc">Dang nhap de quan ly thong tin bai do xe va tai khoan cua ban.</p>

                <form class="auth-form" action="#" method="post">
                    <div class="input-group">
                        <label class="label-text" for="email">Nhap email cua ban</label>
                        <input id="email" type="email" class="input-field" placeholder="Email cua ban" required>
                    </div>

                    <div class="input-group">
                        <label class="label-text" for="password">Nhap mat khau cua ban</label>
                        <div class="password-box">
                            <input type="password" id="password" class="input-field" placeholder="Mat khau" required>
                            <button type="button" class="toggle-btn" onclick="togglePass()" aria-label="Hien thi mat khau">
                                <span id="eye-icon">Show</span>
                            </button>
                        </div>
                    </div>

                    <a href="forgot_password.html" class="forgot-link">Ban quen mat khau?</a>

                    <div class="button-group">
                        <button type="submit" class="btn btn-submit">Dang nhap</button>
                        <a href="index.html" class="btn btn-back">Quay lai</a>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = 'Hide';
            } else {
                passInput.type = 'password';
                icon.innerText = 'Show';
            }
        }
    </script>
</body>
</html>
