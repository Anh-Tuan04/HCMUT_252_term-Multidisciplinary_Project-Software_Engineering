<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Smart Parking</title>
    <link rel="stylesheet" href="style_forgot_password.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="recover-shell">
            <section class="recover-card">
                <p class="chip">Smart Parking</p>
                <h1 class="main-title">Quen mat khau</h1>
                <p class="sub-text">Nhap email de nhan ma xac nhan va tiep tuc dat lai mat khau.</p>

                <form class="form-container" action="#" method="post">
                    <div class="input-group">
                        <label class="label-text" for="recovery-email">Nhap E-mail cua ban</label>
                        <input id="recovery-email" type="email" class="input-field" placeholder="example@gmail.com" required>
                    </div>

                    <div class="button-group">
                        <a href="reset_password_1.html" class="btn btn-submit">Dat lai mat khau</a>
                        <button type="button" class="btn btn-info">Tim ten dang nhap bang E-mail</button>
                        <a href="login.html" class="btn btn-back">Quay lai</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
