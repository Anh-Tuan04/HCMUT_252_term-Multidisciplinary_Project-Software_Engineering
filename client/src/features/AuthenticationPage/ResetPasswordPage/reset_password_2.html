<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết lập mật khẩu - Smart Parking</title>
    <link rel="stylesheet" href="style_reset_password.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="recover-shell">
            <section class="recover-card">
                <p class="chip">Smart Parking</p>
                <h1 class="main-title">Thiet lap mat khau moi</h1>
                <p class="sub-text">Nhap mat khau moi de hoan tat qua trinh khoi phuc tai khoan.</p>

                <form class="form-container" action="#" method="post">
                    <div class="input-group">
                        <label class="label-text" for="new-password">Nhap mat khau moi</label>
                        <div class="password-box">
                            <input type="password" class="input-field" id="new-password" placeholder="Mat khau moi" required>
                            <button type="button" class="toggle-btn" onclick="togglePass('new-password', 'eye-icon-1')" aria-label="Hien thi mat khau moi">
                                <span id="eye-icon-1">Show</span>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="label-text" for="confirm-password">Xac nhan mat khau</label>
                        <div class="password-box">
                            <input type="password" class="input-field" id="confirm-password" placeholder="Nhap lai mat khau" required>
                            <button type="button" class="toggle-btn" onclick="togglePass('confirm-password', 'eye-icon-2')" aria-label="Hien thi xac nhan mat khau">
                                <span id="eye-icon-2">Show</span>
                            </button>
                        </div>
                    </div>

                    <div class="button-group">
                        <a href="login.html" class="btn btn-submit">Dat lai mat khau</a>
                        <a href="forgot_password.html" class="btn btn-back">Quay lai</a>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script>
        function togglePass(inputId, iconId) {
            const passInput = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = 'Hide';
            } else {
                passInput.type = 'password';
                icon.innerText = 'Show';
            }
        }
    </script>
</body>
</html>
