<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận mã - Smart Parking</title>
    <link rel="stylesheet" href="style_reset_password.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="recover-shell">
            <section class="recover-card">
                <p class="chip">Smart Parking</p>
                <h1 class="main-title">Dat lai mat khau</h1>
                <p class="sub-text">Ma xac nhan da duoc gui den E-mail cua ban.</p>

                <form class="form-container" action="#" method="post">
                    <div class="input-group">
                        <label class="label-text" for="verify-code">Nhap ma xac nhan</label>
                        <input id="verify-code" type="text" class="input-field" placeholder="123456" required>
                    </div>

                    <div class="timer-section">
                        <p>Ma nay co hieu luc trong</p>
                        <div class="countdown">01:50</div>
                        <button type="button" class="resend-btn">Gui lai ma</button>
                    </div>

                    <div class="button-group">
                        <a href="reset_password_2.html" class="btn btn-submit">Xac nhan</a>
                        <a href="forgot_password.html" class="btn btn-back">Quay lai</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
