<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Đăng ký</title>
    <link rel="stylesheet" href="style_signup.css">
</head>
<body>
    <div class="page-wrapper">
        <main class="signup-shell">
            <section class="signup-card">
                <p class="chip">Smart Parking</p>
                <h2 class="signup-header">Dang ky tai khoan</h2>
                <p class="desc">Tao tai khoan de su dung day du tinh nang dat cho va quan ly xe.</p>

                <form class="form-container" action="#" method="post">
                    <div class="split-row">
                        <div class="input-group">
                            <label class="label-text" for="first-name">Ten</label>
                            <input id="first-name" class="input-field" type="text" placeholder="Nhap ten" required>
                        </div>

                        <div class="input-group">
                            <label class="label-text" for="last-name">Ho</label>
                            <input id="last-name" class="input-field" type="text" placeholder="Nhap ho" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="label-text" for="email">E-mail</label>
                        <input id="email" class="input-field" type="email" placeholder="example@mail.com" required>
                    </div>

                    <div class="input-group">
                        <label class="label-text" for="username">Ten nguoi dung</label>
                        <input id="username" class="input-field" type="text" placeholder="Username" required>
                    </div>

                    <div class="input-group">
                        <label class="label-text" for="password">Mat khau</label>
                        <div class="password-box">
                            <input type="password" id="password" class="input-field" placeholder="Mat khau" required>
                            <button type="button" class="toggle-btn" onclick="togglePass()" aria-label="Hien thi mat khau">
                                <span id="eye-icon">Show</span>
                            </button>
                        </div>
                    </div>

                    <div class="input-group role-group">
                        <label class="label-text" for="role">Chon vai tro cua ban</label>
                        <select id="role" class="input-field select-field">
                            <option value="user">Nguoi dung thuong</option>
                            <option value="admin">Quan ly bai xe</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-submit">Dang ky</button>
                        <a href="index.html" class="btn btn-back">Quay lai</a>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = 'Hide';
            } else {
                passInput.type = 'password';
                icon.innerText = 'Show';
            }
        }
    </script>
</body>
</html>
